name: comfyui

services:
  - name: comfyui

    type: web

    git:
      repository: github.com/YOUR_USERNAME/YOUR_REPOSITORY
      branch: main

    instance_type: gpu-nvidia-rtx4000-sff

    ports:
      - port: 8188
        protocol: http

    routes:
      - path: /
        port: 8188

    env:
      - key: ALLOW_GIT_URL_INSTALL
        value: "1"

    health_checks:
      - type: http
        path: /
        port: 8188
        initial_delay_seconds: 120
        period_seconds: 30
        timeout_seconds: 10
        failure_threshold: 5

    scaling:
      min: 1
      max: 1
